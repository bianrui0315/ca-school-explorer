name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ca_school_explorer_test
          POSTGRES_USER: cse_test
          POSTGRES_PASSWORD: cse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cse_test -d ca_school_explorer_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://cse_test:cse_test@127.0.0.1:5432/ca_school_explorer_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Type check
        run: python -m mypy src

      - name: Test
        run: python -m pytest

      - name: Validate source catalog
        run: python -m ca_school_explorer validate-sources

      - name: Reject non-English CJK text in tracked source files
        run: |
          if git grep -nP '[\x{3400}-\x{9FFF}]'; then
            echo "Repository source files must be written in English."
            exit 1
          fi

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and format check
        run: npm run web:lint

      - name: Test
        run: npm run web:test

      - name: Build
        run: npm run web:build
