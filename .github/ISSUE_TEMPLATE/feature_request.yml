name: Feature request
description: Propose a user, data, or contributor improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the decision or task that is currently difficult.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence or source data
