name: Bug report
description: Report a reproducible software defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the operating system, browser, or Python version when relevant.
