name: Data issue
description: Report a source, transformation, entity, or interpretation problem.
title: "[Data]: "
labels:
  - data
body:
  - type: input
    id: entity
    attributes:
      label: School, district, or geography
    validations:
      required: true
  - type: input
    id: metric
    attributes:
      label: Metric and school year
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Official source URL
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result and evidence
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: This report contains no student-level or private personal information.
          required: true
