services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ca_school_explorer
      POSTGRES_USER: cse_admin
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "${CSE_DB_PORT:-54329}:5432"
    volumes:
      - cse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cse_admin -d ca_school_explorer"]
      interval: 2s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  cse_postgres_data:
